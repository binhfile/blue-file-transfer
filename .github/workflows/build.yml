name: Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Run tests
        run: go test -v -race -count=1 ./internal/...
      - name: Run coverage
        run: |
          go test -coverprofile=coverage.out ./internal/protocol/ ./internal/fsutil/ ./internal/transfer/ ./internal/server/ ./internal/client/
          go tool cover -func=coverage.out

  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            ext: ""
          - os: linux
            arch: arm64
            ext: ""
          - os: linux
            arch: arm
            goarm: "7"
            ext: ""
          - os: windows
            arch: amd64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build static binary
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          go build -ldflags="-s -w" -o build/bft${{ matrix.ext }} ./cmd/bft/

      - name: Package tar.gz
        run: |
          DIST_DIR="bft-${{ matrix.os }}-${{ matrix.arch }}"
          mkdir -p "dist/${DIST_DIR}"
          cp build/bft${{ matrix.ext }} "dist/${DIST_DIR}/"
          cp README.md "dist/${DIST_DIR}/"
          if [ "${{ matrix.os }}" = "linux" ]; then
            cp scripts/install-server.sh "dist/${DIST_DIR}/"
          fi
          cd dist
          tar czf "${DIST_DIR}.tar.gz" "$DIST_DIR"
          echo "=== Package contents ==="
          tar tzf "${DIST_DIR}.tar.gz"
          ls -lh "${DIST_DIR}.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bft-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/bft-${{ matrix.os }}-${{ matrix.arch }}.tar.gz

  pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Build pages site
        run: |
          mkdir -p site/downloads
          cp artifacts/bft-linux-amd64/bft-linux-amd64.tar.gz site/downloads/
          cp artifacts/bft-linux-arm64/bft-linux-arm64.tar.gz site/downloads/
          cp artifacts/bft-linux-arm/bft-linux-arm.tar.gz site/downloads/
          cp artifacts/bft-windows-amd64/bft-windows-amd64.tar.gz site/downloads/

          # Get sizes
          AMD64_SIZE=$(du -h site/downloads/bft-linux-amd64.tar.gz | cut -f1)
          ARM64_SIZE=$(du -h site/downloads/bft-linux-arm64.tar.gz | cut -f1)
          ARM_SIZE=$(du -h site/downloads/bft-linux-arm.tar.gz | cut -f1)
          WIN_SIZE=$(du -h site/downloads/bft-windows-amd64.tar.gz | cut -f1)
          BUILD_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          COMMIT=$(git rev-parse --short HEAD)

          cat > site/index.html << HTMLEOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Blue File Transfer - Downloads</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; color: #333; background: #f8f9fa; }
              h1 { color: #0366d6; }
              h2 { color: #24292e; border-bottom: 1px solid #e1e4e8; padding-bottom: 8px; }
              table { width: 100%; border-collapse: collapse; margin: 16px 0; }
              th, td { text-align: left; padding: 10px 12px; border: 1px solid #e1e4e8; }
              th { background: #f1f3f5; }
              a { color: #0366d6; text-decoration: none; }
              a:hover { text-decoration: underline; }
              .btn { display: inline-block; padding: 8px 16px; background: #0366d6; color: #fff !important; border-radius: 6px; font-weight: 600; }
              .btn:hover { background: #0256b9; text-decoration: none; }
              code { background: #f1f3f5; padding: 2px 6px; border-radius: 3px; font-size: 0.9em; }
              pre { background: #24292e; color: #e1e4e8; padding: 16px; border-radius: 6px; overflow-x: auto; }
              .meta { color: #6a737d; font-size: 0.85em; }
              .features { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
              .features li { margin: 4px 0; }
            </style>
          </head>
          <body>
            <h1>Blue File Transfer (BFT)</h1>
            <p>Bluetooth file transfer CLI with encryption, compression, and remote shell.</p>

            <h2>Downloads</h2>
            <p class="meta">Build: ${BUILD_DATE} | Commit: <a href="https://github.com/binhfile/blue-file-transfer/commit/${COMMIT}">${COMMIT}</a></p>

            <table>
              <tr><th>Platform</th><th>Architecture</th><th>Size</th><th>Download</th></tr>
              <tr><td>Linux</td><td>x86_64</td><td>${AMD64_SIZE}</td><td><a class="btn" href="downloads/bft-linux-amd64.tar.gz">Download</a></td></tr>
              <tr><td>Linux</td><td>ARM64 (Jetson, RPi 3/4/5)</td><td>${ARM64_SIZE}</td><td><a class="btn" href="downloads/bft-linux-arm64.tar.gz">Download</a></td></tr>
              <tr><td>Linux</td><td>ARMv7 (RPi 2/3)</td><td>${ARM_SIZE}</td><td><a class="btn" href="downloads/bft-linux-arm.tar.gz">Download</a></td></tr>
              <tr><td>Windows</td><td>x86_64</td><td>${WIN_SIZE}</td><td><a class="btn" href="downloads/bft-windows-amd64.tar.gz">Download</a></td></tr>
            </table>

            <h2>Quick Start</h2>
            <pre>
          # Extract
          tar xzf bft-linux-amd64.tar.gz && cd bft-linux-amd64

          # Server
          sudo ./bft server --dir /shared

          # Client (another machine)
          sudo ./bft ls --server 00:1A:7D:DA:71:22
          sudo ./bft download --server 00:1A:7D:DA:71:22 --path myfile.txt

          # Interactive shell (like SSH over Bluetooth)
          sudo ./bft shell --server 00:1A:7D:DA:71:22</pre>

            <h2>Features</h2>
            <ul class="features">
              <li>File transfer: ls, download, upload, rm, mkdir, cp, mv</li>
              <li>AES-256-GCM encryption (hardware accelerated)</li>
              <li>DEFLATE compression (enabled by default)</li>
              <li>Multi-user authentication</li>
              <li>Interactive shell (SSH-like)</li>
              <li>Remote command execution</li>
              <li>L2CAP transport (3-4x faster than RFCOMM)</li>
              <li>Static binary, no dependencies</li>
            </ul>

            <h2>Links</h2>
            <ul>
              <li><a href="https://github.com/binhfile/blue-file-transfer">GitHub Repository</a></li>
              <li><a href="https://github.com/binhfile/blue-file-transfer/releases">Releases</a></li>
            </ul>
          </body>
          </html>
          HTMLEOF

          echo "=== Pages site ==="
          ls -lhR site/

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            bft-linux-amd64/bft-linux-amd64.tar.gz
            bft-linux-arm64/bft-linux-arm64.tar.gz
            bft-linux-arm/bft-linux-arm.tar.gz
            bft-windows-amd64/bft-windows-amd64.tar.gz
