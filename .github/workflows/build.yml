name: Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Run tests
        run: go test -v -race -count=1 ./internal/...
      - name: Run coverage
        run: |
          go test -coverprofile=coverage.out ./internal/protocol/ ./internal/fsutil/ ./internal/transfer/ ./internal/server/ ./internal/client/
          go tool cover -func=coverage.out

  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            ext: ""
          - os: linux
            arch: arm64
            ext: ""
          - os: linux
            arch: arm
            goarm: "7"
            ext: ""
          - os: windows
            arch: amd64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build static binary
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          go build -ldflags="-s -w" -o build/bft${{ matrix.ext }} ./cmd/bft/

      - name: Package tar.gz
        run: |
          DIST_DIR="bft-${{ matrix.os }}-${{ matrix.arch }}"
          mkdir -p "dist/${DIST_DIR}"
          cp build/bft${{ matrix.ext }} "dist/${DIST_DIR}/"
          cp README.md "dist/${DIST_DIR}/"
          if [ "${{ matrix.os }}" = "linux" ]; then
            cp scripts/install-server.sh "dist/${DIST_DIR}/"
          fi
          cd dist
          tar czf "${DIST_DIR}.tar.gz" "$DIST_DIR"
          echo "=== Package contents ==="
          tar tzf "${DIST_DIR}.tar.gz"
          ls -lh "${DIST_DIR}.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bft-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/bft-${{ matrix.os }}-${{ matrix.arch }}.tar.gz

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            bft-linux-amd64/bft-linux-amd64.tar.gz
            bft-linux-arm64/bft-linux-arm64.tar.gz
            bft-linux-arm/bft-linux-arm.tar.gz
            bft-windows-amd64/bft-windows-amd64.tar.gz
