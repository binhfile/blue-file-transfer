name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [created]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Run tests
        run: go test -v -race -count=1 ./internal/...
      - name: Run coverage
        run: |
          go test -coverprofile=coverage.out ./internal/protocol/ ./internal/fsutil/ ./internal/transfer/ ./internal/server/ ./internal/client/
          go tool cover -func=coverage.out

  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            ext: ""
          - os: windows
            arch: amd64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build static binary
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          go build -ldflags="-s -w" -o bft-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }} ./cmd/bft/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bft-${{ matrix.os }}-${{ matrix.arch }}
          path: bft-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}

  release:
    name: Upload release assets
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bft-linux-amd64/bft-linux-amd64
            bft-windows-amd64/bft-windows-amd64.exe
